name: Deploy

on:
  push:
    branches: [main]

jobs:
  github-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build site directory
        run: |
          mkdir -p _site/data
          cp *.html *.css *.js hero.png _site/
          cp data/*.json _site/data/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
