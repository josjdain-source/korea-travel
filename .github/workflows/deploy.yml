name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Deploy
        env:
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
        run: python pipeline/cf_deploy.py
