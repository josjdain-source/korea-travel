name: Daily Content Pipeline

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 오전 10시 KST (UTC 01:00)
  workflow_dispatch:        # GitHub Actions 탭에서 수동 실행 버튼

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # visits.json 커밋을 위해 필요

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install anthropic requests yt-dlp

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python pipeline/run.py

      - name: Commit updated data
        run: |
          git config user.name  "pipeline-bot"
          git config user.email "bot@noreply.github.com"
          git add data/visits.json pipeline/processed.json
          git diff --staged --quiet && echo "no changes" || \
            git commit -m "chore(pipeline): auto-update visits $(date +%Y-%m-%d)" && \
            git push

      # GitHub Pages + Cloudflare Pages auto-deploy via deploy.yml on git push
