name: Site Health Check

on:
  schedule:
    - cron: '0 */6 * * *'  # 6시간마다
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check sites
        run: |
          check() {
            local url=$1
            local name=$2
            local code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$url")
            if [ "$code" != "200" ]; then
              echo "FAIL $name → $url (HTTP $code)"
              echo "fail=true" >> $GITHUB_ENV
            else
              echo "OK   $name ($code)"
            fi
          }

          # 단일 현실 좌표 = korea-travel-git (CF git연동 자동배포). 다른 출구는 폐기됨.
          # 클린 URL로 점검(.html은 CF가 308 정규화하므로 200이 안 나옴).
          check "https://korea-travel-git.pages.dev/"                 "home"
          check "https://korea-travel-git.pages.dev/creators"         "creators (loop guard)"
          check "https://korea-travel-git.pages.dev/ranking"          "ranking"
          check "https://korea-travel-git.pages.dev/data/visits.json" "data"

      - name: Fail if any site is down
        if: env.fail == 'true'
        run: |
          echo "One or more sites are DOWN. Check the logs above."
          exit 1
